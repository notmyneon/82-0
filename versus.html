<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NiceHL Versus Draft</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #101820;
      color: white;
      margin: 0;
      padding: 30px;
    }

    .container {
      max-width: 1250px;
      margin: 0 auto;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .panel {
      background: #1d2a35;
      border: 1px solid #314657;
      border-radius: 14px;
      padding: 22px;
      margin-bottom: 20px;
    }

    button,
    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-top: 6px;
      margin-right: 8px;
      font-size: 1rem;
    }

    button {
      cursor: pointer;
      font-weight: bold;
      background: #f4f4f4;
      color: #111;
    }

    button:hover {
      opacity: 0.85;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    input {
      width: 240px;
      max-width: 100%;
    }

    .hidden {
      display: none;
    }

    .muted {
      color: #c9d6df;
      font-size: 0.95rem;
      margin-top: 10px;
    }

    .error {
      color: #ffb4b4;
      font-weight: bold;
    }

    .success {
      color: #b7ffb7;
      font-weight: bold;
    }

    .draft-progress {
      color: #c9d6df;
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .turn-banner {
      background: #263746;
      border: 1px solid #4b6578;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .current-team {
      font-size: 1.8rem;
      font-weight: bold;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: 14px;
    }

    .score-card {
      background: #263746;
      border: 1px solid #4b6578;
      border-radius: 12px;
      padding: 14px;
    }

    .score-card.active {
      outline: 3px solid #ffffff;
    }

    .team-name-display {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .spin-area {
      margin-top: 18px;
      padding: 18px;
      background: #263746;
      border: 1px solid #4b6578;
      border-radius: 12px;
    }

    .spin-result {
      margin-top: 14px;
      font-size: 1.8rem;
      font-weight: bold;
      color: #ffffff;
    }

    .position-columns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 20px;
    }

    .position-column {
      background: #263746;
      border: 1px solid #4b6578;
      border-radius: 12px;
      padding: 14px;
      min-height: 180px;
    }

    .position-column.locked {
      opacity: 0.55;
    }

    .column-title {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .column-count {
      color: #c9d6df;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .player-card {
      background: #1d2a35;
      border: 1px solid #4b6578;
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 7px;
      cursor: pointer;
      transition: 0.15s ease;
      font-size: 0.9rem;
    }

    .player-card:hover {
      background: #345066;
      transform: translateY(-1px);
    }

    .player-row {
      display: grid;
      grid-template-columns: 1.35fr 1.9fr;
      gap: 8px;
      align-items: center;
    }

    .player-name {
      font-size: 0.95rem;
      font-weight: bold;
      margin-bottom: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stats {
      margin-top: 0;
      font-size: 0.82rem;
      line-height: 1.2;
      text-align: right;
      color: #dbe7ef;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      margin-top: 20px;
    }

    .winner-banner {
      background: #263746;
      border: 1px solid #4b6578;
      border-radius: 12px;
      padding: 18px;
      text-align: center;
      margin-bottom: 18px;
    }

    .winner-name {
      font-size: 2.4rem;
      font-weight: bold;
    }

    .final-score {
      font-size: 1.4rem;
      margin-top: 8px;
    }

    .hockey-lineup {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      margin-top: 20px;
    }

    .line-row {
      display: grid;
      gap: 14px;
      width: 100%;
    }

    .forward-row {
      grid-template-columns: repeat(3, 1fr);
    }

    .defence-row {
      grid-template-columns: repeat(2, 1fr);
      max-width: 70%;
    }

    .goalie-row {
      grid-template-columns: 1fr;
      max-width: 35%;
    }

    .lineup-card {
      background: #263746;
      border: 1px solid #4b6578;
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }

    .lineup-position {
      color: #c9d6df;
      font-size: 0.85rem;
      margin-bottom: 6px;
    }

    .lineup-player-name {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .lineup-avg {
      font-size: 1.8rem;
      font-weight: bold;
    }

    .lineup-label {
      color: #c9d6df;
      font-size: 0.78rem;
      margin-top: 4px;
    }

    .team-total {
      font-size: 2rem;
      font-weight: bold;
      text-align: center;
      margin-top: 16px;
    }

    .footer-buttons {
      margin-top: 20px;
    }

    @media (max-width: 950px) {
      .position-columns,
      .scoreboard,
      .results-grid {
        grid-template-columns: 1fr;
      }

      .forward-row,
      .defence-row,
      .goalie-row {
        grid-template-columns: 1fr;
        max-width: 100%;
      }

      body {
        padding: 15px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>NiceHL Versus Draft</h1>

    <div class="panel" id="loadingPanel">
      <h2>Loading NiceHL Data</h2>
      <p>The league data is being loaded automatically.</p>
      <p id="loadMessage">Loading data...</p>
      <button id="retryButton" class="hidden" onclick="loadData()">Try Again</button>
    </div>

    <div class="panel hidden" id="setupPanel">
      <h2>Set Up Matchup</h2>

      <p class="muted">
        Each team drafts 3 forwards, 2 defencemen, and 1 goalie. Highest total average fantasy points wins.
      </p>

      <label>Team 1 Name</label><br />
      <input type="text" id="team1NameInput" value="Team 1" /><br /><br />

      <label>Team 2 Name</label><br />
      <input type="text" id="team2NameInput" value="Team 2" /><br /><br />

      <button onclick="startGame()">Start Versus Draft</button>
      <a href="index.html"><button>Back to 82-0</button></a>
    </div>

    <div class="panel hidden" id="gamePanel">
      <div class="turn-banner">
        <div class="current-team" id="currentTeamText"></div>
        <p class="draft-progress" id="draftProgress"></p>
      </div>

      <div class="scoreboard" id="scoreboard"></div>

      <p id="roundDescription"></p>

      <div class="spin-area">
        <button id="spinButton" onclick="spinYearAndTeam()">Spin Year + Team</button>
        <button id="spinAgainButton" onclick="spinAgain()" class="hidden">Spin Again</button>
        <div id="spinAgainText" class="muted"></div>
        <div id="spinResult" class="spin-result"></div>
      </div>

      <div class="position-columns" id="positionColumns"></div>
    </div>

    <div class="panel hidden" id="resultPanel">
      <div class="winner-banner">
        <div class="winner-name" id="winnerText"></div>
        <div class="final-score" id="finalScoreText"></div>
      </div>

      <div class="results-grid" id="resultsGrid"></div>

      <div class="footer-buttons">
        <button onclick="showSetup()">Play Again</button>
        <a href="index.html"><button>Back to 82-0</button></a>
      </div>
    </div>
  </div>

  <script>
    let allPlayers = {
      F: [],
      D: [],
      G: []
    };

    let teams = [];
    let currentTeamIndex = 0;
    let currentSpin = null;

    const maxSpinAgainUses = 2;

    const rosterRequirements = {
      F: 3,
      D: 2,
      G: 1
    };

    const totalPicksPerTeam =
      rosterRequirements.F +
      rosterRequirements.D +
      rosterRequirements.G;

    const positionNames = {
      F: "Forward",
      D: "Defence",
      G: "Goalie"
    };

    window.addEventListener("DOMContentLoaded", loadData);

    async function loadData() {
      const message = document.getElementById("loadMessage");
      const retryButton = document.getElementById("retryButton");

      message.className = "";
      message.textContent = "Loading data...";

      retryButton.classList.add("hidden");

      try {
        const fText = await fetchCSV("data/F.csv");
        const dText = await fetchCSV("data/D.csv");
        const gText = await fetchCSV("data/G.csv");

        allPlayers.F = normalizePlayers(parseCSV(fText), "F");
        allPlayers.D = normalizePlayers(parseCSV(dText), "D");
        allPlayers.G = normalizePlayers(parseCSV(gText), "G");

        assignPlayerIds();

        if (allPlayers.F.length < rosterRequirements.F * 2) {
          throw new Error("Not enough valid forwards found.");
        }

        if (allPlayers.D.length < rosterRequirements.D * 2) {
          throw new Error("Not enough valid defence players found.");
        }

        if (allPlayers.G.length < rosterRequirements.G * 2) {
          throw new Error("Not enough valid goalies found.");
        }

        message.className = "success";
        message.textContent = "League data loaded.";

        document.getElementById("loadingPanel").classList.add("hidden");
        document.getElementById("setupPanel").classList.remove("hidden");
      } catch (error) {
        message.className = "error";
        message.textContent = "Error: " + error.message;
        retryButton.classList.remove("hidden");
      }
    }

    async function fetchCSV(path) {
      const response = await fetch(path, {
        cache: "no-cache"
      });

      if (!response.ok) {
        throw new Error("Could not load " + path);
      }

      return await response.text();
    }

    function showSetup() {
      document.getElementById("resultPanel").classList.add("hidden");
      document.getElementById("gamePanel").classList.add("hidden");
      document.getElementById("setupPanel").classList.remove("hidden");
    }

    function startGame() {
      const team1Name =
        document.getElementById("team1NameInput").value.trim() || "Team 1";

      const team2Name =
        document.getElementById("team2NameInput").value.trim() || "Team 2";

      teams = [
        {
          name: team1Name,
          lineup: [],
          spinAgainUsed: 0
        },
        {
          name: team2Name,
          lineup: [],
          spinAgainUsed: 0
        }
      ];

      currentTeamIndex = 0;
      currentSpin = null;

      document.getElementById("setupPanel").classList.add("hidden");
      document.getElementById("resultPanel").classList.add("hidden");
      document.getElementById("gamePanel").classList.remove("hidden");

      showTurn();
    }

    function showTurn() {
      if (isGameComplete()) {
        finishGame();
        return;
      }

      if (isTeamComplete(getCurrentTeam())) {
        switchToNextAvailableTeam();
      }

      currentSpin = null;

      const currentTeam = getCurrentTeam();

      document.getElementById("currentTeamText").textContent =
        currentTeam.name + "'s Turn";

      document.getElementById("draftProgress").textContent =
        getDraftProgressText(currentTeam);

      document.getElementById("roundDescription").textContent =
        "Spin first. Then choose one available player from the forwards, defence, or goalies box.";

      document.getElementById("spinResult").textContent = "";

      const spinButton = document.getElementById("spinButton");
      spinButton.disabled = false;
      spinButton.textContent = "Spin Year + Team";

      const spinAgainButton = document.getElementById("spinAgainButton");
      spinAgainButton.classList.add("hidden");
      spinAgainButton.disabled = false;

      updateSpinAgainText();
      renderScoreboard();
      renderPositionColumns();
    }

    function getCurrentTeam() {
      return teams[currentTeamIndex];
    }

    function getOtherTeamIndex() {
      return currentTeamIndex === 0 ? 1 : 0;
    }

    function switchToNextAvailableTeam() {
      const otherIndex = getOtherTeamIndex();

      if (!isTeamComplete(teams[otherIndex])) {
        currentTeamIndex = otherIndex;
      }
    }

    function isGameComplete() {
      return teams.length === 2 &&
        isTeamComplete(teams[0]) &&
        isTeamComplete(teams[1]);
    }

    function isTeamComplete(team) {
      return team.lineup.length >= totalPicksPerTeam;
    }

    function getDraftProgressText(team) {
      return (
        "Drafted " + team.lineup.length + " of " + totalPicksPerTeam +
        " | F " + getDraftedCount(team, "F") + "/" + rosterRequirements.F +
        " | D " + getDraftedCount(team, "D") + "/" + rosterRequirements.D +
        " | G " + getDraftedCount(team, "G") + "/" + rosterRequirements.G
      );
    }

    function renderScoreboard() {
      const scoreboard = document.getElementById("scoreboard");
      scoreboard.innerHTML = "";

      teams.forEach((team, index) => {
        const card = document.createElement("div");
        card.className = "score-card" + (index === currentTeamIndex ? " active" : "");

        card.innerHTML = `
          <div class="team-name-display">${escapeHTML(team.name)}</div>
          <div class="muted">${getDraftProgressText(team)}</div>
          <div class="muted">Spin Again remaining: ${maxSpinAgainUses - team.spinAgainUsed}</div>
        `;

        scoreboard.appendChild(card);
      });
    }

    function spinYearAndTeam() {
      performSpin();
    }

    function spinAgain() {
      const currentTeam = getCurrentTeam();

      if (!currentSpin) {
        return;
      }

      if (currentTeam.spinAgainUsed >= maxSpinAgainUses) {
        return;
      }

      currentTeam.spinAgainUsed++;
      performSpin();
    }

    function performSpin() {
      const currentTeam = getCurrentTeam();
      const availableCombos = getAvailableSeasonTeamCombos(currentTeam);

      if (availableCombos.length === 0) {
        document.getElementById("positionColumns").innerHTML =
          "<p class='error'>No valid season and team combinations left for this team.</p>";
        return;
      }

      const possibleCombos = availableCombos.filter(combo => {
        if (!currentSpin) {
          return true;
        }

        return !(
          normalizeKey(combo.season) === normalizeKey(currentSpin.season) &&
          normalizeKey(combo.fantasyTeam) === normalizeKey(currentSpin.fantasyTeam)
        );
      });

      const spinPool = possibleCombos.length > 0 ? possibleCombos : availableCombos;

      currentSpin = spinPool[
        Math.floor(Math.random() * spinPool.length)
      ];

      document.getElementById("spinResult").textContent =
        currentSpin.season + " | " + currentSpin.fantasyTeam;

      document.getElementById("roundDescription").textContent =
        "Choose one player from this season and fantasy team.";

      const spinButton = document.getElementById("spinButton");
      spinButton.disabled = true;
      spinButton.textContent = "Spun";

      const spinAgainButton = document.getElementById("spinAgainButton");
      spinAgainButton.classList.remove("hidden");
      spinAgainButton.disabled = currentTeam.spinAgainUsed >= maxSpinAgainUses;

      updateSpinAgainText();
      renderScoreboard();
      renderPositionColumns();
    }

    function updateSpinAgainText() {
      if (!teams.length) {
        return;
      }

      const currentTeam = getCurrentTeam();
      const remaining = maxSpinAgainUses - currentTeam.spinAgainUsed;

      document.getElementById("spinAgainText").textContent =
        currentTeam.name + " Spin Again uses remaining: " + remaining;
    }

    function getAvailableSeasonTeamCombos(team) {
      const seen = new Set();
      const combos = [];

      ["F", "D", "G"].forEach(positionGroup => {
        if (isPositionFull(team, positionGroup)) {
          return;
        }

        allPlayers[positionGroup].forEach(player => {
          if (isPlayerAlreadyDrafted(player)) {
            return;
          }

          const comboKey =
            normalizeKey(player.season) + "||" + normalizeKey(player.fantasyTeam);

          if (!seen.has(comboKey)) {
            seen.add(comboKey);

            combos.push({
              season: player.season,
              fantasyTeam: player.fantasyTeam
            });
          }
        });
      });

      return combos;
    }

    function renderPositionColumns() {
      const container = document.getElementById("positionColumns");
      container.innerHTML = "";

      if (!teams.length) {
        return;
      }

      const currentTeam = getCurrentTeam();

      ["F", "D", "G"].forEach(positionGroup => {
        const draftedCount = getDraftedCount(currentTeam, positionGroup);
        const requiredCount = rosterRequirements[positionGroup];
        const isFull = isPositionFull(currentTeam, positionGroup);

        const column = document.createElement("div");
        column.className = "position-column" + (isFull ? " locked" : "");

        const title = document.createElement("div");
        title.className = "column-title";
        title.textContent = positionNames[positionGroup];

        const count = document.createElement("div");
        count.className = "column-count";
        count.textContent = draftedCount + "/" + requiredCount + " filled";

        column.appendChild(title);
        column.appendChild(count);

        if (isFull) {
          const muted = document.createElement("p");
          muted.className = "muted";
          muted.textContent = "Position filled for " + currentTeam.name + ".";
          column.appendChild(muted);
        } else if (!currentSpin) {
          const muted = document.createElement("p");
          muted.className = "muted";
          muted.textContent = "Spin to reveal available players.";
          column.appendChild(muted);
        } else {
          const matchingPlayers = getMatchingPlayers(positionGroup);

          if (matchingPlayers.length === 0) {
            const muted = document.createElement("p");
            muted.className = "muted";
            muted.textContent = "No available players for this position.";
            column.appendChild(muted);
          } else {
            matchingPlayers.forEach(player => {
              const card = document.createElement("div");
              card.className = "player-card";
              card.onclick = () => draftPlayer(player);

              const row = document.createElement("div");
              row.className = "player-row";

              const name = document.createElement("div");
              name.className = "player-name";
              name.textContent = player.playerName;
              name.title = player.playerName;

              const stats = document.createElement("div");
              stats.className = "stats";
              stats.innerHTML = getCompactStats(player);

              row.appendChild(name);
              row.appendChild(stats);
              card.appendChild(row);
              column.appendChild(card);
            });
          }
        }

        container.appendChild(column);
      });
    }

    function getMatchingPlayers(positionGroup) {
      if (!currentSpin) {
        return [];
      }

      return allPlayers[positionGroup]
        .filter(player =>
          normalizeKey(player.season) === normalizeKey(currentSpin.season) &&
          normalizeKey(player.fantasyTeam) === normalizeKey(currentSpin.fantasyTeam) &&
          !isPlayerAlreadyDrafted(player)
        )
        .sort((a, b) => {
          return getDisplaySortValue(b) - getDisplaySortValue(a);
        });
    }

    function getDisplaySortValue(player) {
      if (player.positionGroup === "G") {
        const wins = toNumber(player.W);
        const shutouts = toNumber(player.SO);
        const goalsAgainst = toNumber(player.GA);

        const safeWins = Number.isNaN(wins) ? 0 : wins;
        const safeShutouts = Number.isNaN(shutouts) ? 0 : shutouts;
        const safeGoalsAgainst = Number.isNaN(goalsAgainst) ? 999 : goalsAgainst;

        return (safeWins * 100) + (safeShutouts * 10) - safeGoalsAgainst;
      }

      const goals = toNumber(player.G);
      const assists = toNumber(player.A);

      const safeGoals = Number.isNaN(goals) ? 0 : goals;
      const safeAssists = Number.isNaN(assists) ? 0 : assists;

      return safeGoals + safeAssists;
    }

    function draftPlayer(player) {
      const currentTeam = getCurrentTeam();

      if (isPositionFull(currentTeam, player.positionGroup)) {
        return;
      }

      if (isPlayerAlreadyDrafted(player)) {
        return;
      }

      currentTeam.lineup.push(player);

      if (isGameComplete()) {
        finishGame();
        return;
      }

      const otherIndex = getOtherTeamIndex();

      if (!isTeamComplete(teams[otherIndex])) {
        currentTeamIndex = otherIndex;
      }

      showTurn();
    }

    function isPositionFull(team, positionGroup) {
      return getDraftedCount(team, positionGroup) >= rosterRequirements[positionGroup];
    }

    function getDraftedCount(team, positionGroup) {
      return team.lineup.filter(player => player.positionGroup === positionGroup).length;
    }

    function isPlayerAlreadyDrafted(player) {
      return teams.some(team =>
        team.lineup.some(drafted =>
          normalizeKey(drafted.playerName) === normalizeKey(player.playerName)
        )
      );
    }

    function finishGame() {
      document.getElementById("gamePanel").classList.add("hidden");
      document.getElementById("resultPanel").classList.remove("hidden");

      const score1 = getTeamScore(teams[0]);
      const score2 = getTeamScore(teams[1]);

      if (score1 > score2) {
        document.getElementById("winnerText").textContent =
          teams[0].name + " Wins!";
      } else if (score2 > score1) {
        document.getElementById("winnerText").textContent =
          teams[1].name + " Wins!";
      } else {
        document.getElementById("winnerText").textContent =
          "Tie Game!";
      }

      document.getElementById("finalScoreText").textContent =
        teams[0].name + " " + formatAvgPoints(score1) +
        " - " +
        teams[1].name + " " + formatAvgPoints(score2);

      renderFinalResults();
    }

    function getTeamScore(team) {
      return team.lineup.reduce((total, player) => {
        return total + player.avgPoints;
      }, 0);
    }

    function renderFinalResults() {
      const grid = document.getElementById("resultsGrid");
      grid.innerHTML = "";

      teams.forEach(team => {
        const teamPanel = document.createElement("div");
        teamPanel.className = "panel";

        const forwards = getPlayersByPosition(team, "F");
        const defence = getPlayersByPosition(team, "D");
        const goalies = getPlayersByPosition(team, "G");

        teamPanel.innerHTML = `
          <h2>${escapeHTML(team.name)}</h2>

          <div class="hockey-lineup">
            <div class="line-row forward-row">
              ${forwards.map((player, index) => makeLineupCard(player, "F" + (index + 1))).join("")}
            </div>

            <div class="line-row defence-row">
              ${defence.map((player, index) => makeLineupCard(player, "D" + (index + 1))).join("")}
            </div>

            <div class="line-row goalie-row">
              ${goalies.map((player, index) => makeLineupCard(player, "G" + (index + 1))).join("")}
            </div>
          </div>

          <div class="team-total">
            Total: ${formatAvgPoints(getTeamScore(team))}
          </div>
        `;

        grid.appendChild(teamPanel);
      });
    }

    function getPlayersByPosition(team, positionGroup) {
      return team.lineup.filter(player => player.positionGroup === positionGroup);
    }

    function makeLineupCard(player, slotLabel) {
      return `
        <div class="lineup-card">
          <div class="lineup-position">${escapeHTML(slotLabel)}</div>
          <div class="lineup-player-name">${escapeHTML(player.playerName)}</div>
          <div class="lineup-avg">${formatAvgPoints(player.avgPoints)}</div>
          <div class="lineup-label">${escapeHTML(player.fantasyTeam)} | ${escapeHTML(player.season)}</div>
        </div>
      `;
    }

    function getCompactStats(player) {
      if (player.positionGroup === "G") {
        return `
          GP ${escapeHTML(player.GP || "0")} |
          W ${escapeHTML(player.W || "0")} |
          GA ${escapeHTML(player.GA || "0")} |
          SO ${escapeHTML(player.SO || "0")}
        `;
      }

      return `
        GP ${escapeHTML(player.GP || "0")} |
        G ${escapeHTML(player.G || "0")} |
        A ${escapeHTML(player.A || "0")} |
        BLK ${escapeHTML(player.BLK || "0")}
      `;
    }

    function formatAvgPoints(value) {
      const number = Number(value);

      if (Number.isNaN(number)) {
        return "0.00";
      }

      return number.toFixed(2);
    }

    function parseCSV(text) {
      const rows = [];
      let currentRow = [];
      let currentValue = "";
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
          currentValue += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          currentRow.push(currentValue);
          currentValue = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (currentValue.length > 0 || currentRow.length > 0) {
            currentRow.push(currentValue);
            rows.push(currentRow);
            currentRow = [];
            currentValue = "";
          }

          if (char === "\r" && nextChar === "\n") {
            i++;
          }
        } else {
          currentValue += char;
        }
      }

      if (currentValue.length > 0 || currentRow.length > 0) {
        currentRow.push(currentValue);
        rows.push(currentRow);
      }

      if (rows.length === 0) {
        return [];
      }

      const headers = rows[0].map(header => cleanHeader(header));

      return rows.slice(1)
        .filter(row => row.some(cell => String(cell).trim() !== ""))
        .map(row => {
          const item = {};

          headers.forEach((header, index) => {
            item[header] = row[index] ? row[index].trim() : "";
          });

          return item;
        });
    }

    function cleanHeader(header) {
      return String(header)
        .replace(/^\uFEFF/, "")
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/[^a-z0-9]/g, "");
    }

    function normalizePlayers(rows, positionGroup) {
      return rows.map(row => {
        const player = {
          positionGroup: positionGroup,

          season: getValue(row, [
            "season",
            "year",
            "yr"
          ]),

          fantasyTeam: getValue(row, [
            "team",
            "fantasyteam",
            "fantasyclub",
            "manager",
            "owner",
            "franchise",
            "rosterteam"
          ]),

          playerName: getValue(row, [
            "player",
            "playername",
            "name",
            "goalie",
            "skater"
          ]),

          avgPoints: toNumber(getValue(row, [
            "avgpoints",
            "averagepoints",
            "avgfantasypoints",
            "averagefantasypoints",
            "avgfp",
            "averagefp",
            "fptsavg",
            "fantasypointsaverage",
            "fantasyavg",
            "avg",
            "average",
            "fptspergame",
            "pointspergame",
            "ppg"
          ])),

          GP: getValue(row, ["gp", "gamesplayed"]),

          G: getValue(row, ["g", "goals"]),
          A: getValue(row, ["a", "assists"]),
          BLK: getValue(row, ["blk", "blocks", "blockedshots"]),

          W: getValue(row, ["w", "wins"]),
          GA: getValue(row, ["ga", "goalsagainst"]),
          SO: getValue(row, ["so", "shutouts"])
        };

        return player;
      }).filter(player =>
        player.playerName &&
        player.season &&
        player.fantasyTeam &&
        !Number.isNaN(player.avgPoints)
      );
    }

    function getValue(row, possibleNames) {
      for (const name of possibleNames) {
        if (row[name] !== undefined) {
          return row[name];
        }
      }

      return "";
    }

    function toNumber(value) {
      const cleaned = String(value)
        .replace(/,/g, "")
        .trim();

      if (cleaned === "") {
        return NaN;
      }

      return Number(cleaned);
    }

    function assignPlayerIds() {
      let idCounter = 1;

      ["F", "D", "G"].forEach(positionGroup => {
        allPlayers[positionGroup].forEach(player => {
          player.id = positionGroup + "-" + idCounter;
          idCounter++;
        });
      });
    }

    function normalizeKey(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, " ");
    }

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
